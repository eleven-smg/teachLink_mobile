name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  test-e2e:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2
      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash
      - name: Run E2E tests
        run: maestro cloud --api-key ${{ secrets.MAESTRO_API_KEY }} --app-file ./app.apk maestro/